services:
  - type: web
    name: careflow-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SPEECHMATICS_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./careflow.db
    disk:
      name: careflow-db
      mountPath: /opt/render/project/src
      sizeGB: 1
